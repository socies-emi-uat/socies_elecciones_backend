spring.application.name=activos

#
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DATABASE}?sslmode=require
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.config.import=optional:file:.env[.properties]
# Driver de PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Opcionalmente configuraciones JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# devtools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

backblaze.key-id=${BACKBLAZE_KEY_ID}
backblaze.application-key=${BACKBLAZE_APPLICATION_KEY}
backblaze.bucket-name=${BACKBLAZE_BUCKET_NAME}
backblaze.endpoint=${BACKBLAZE_ENDPOINT}

# Actuator endpoints para monitoreo de rendimiento
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=when-authorized
management.endpoint.metrics.enabled=true

# Configuración para pruebas de carga programadas
loadtest.scheduled.enabled=false
